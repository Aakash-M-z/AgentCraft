services:
  - type: web
    name: agentcraft-frontend
    runtime: static
    rootDir: artifacts/agentcraft
    buildCommand: npm install && npm run build
    staticPublishPath: dist/public
    envVars:
      - key: VITE_API_URL
        value: https://agentcraft-kexf.onrender.com
      - key: NODE_VERSION
        value: "18"
